# Phase 81.19.b — out-of-tree standalone subprocess plugin.
#
# This manifest is parsed at compile-time via `include_str!` in
# `EmailPlugin::new()` and shipped alongside the binary so the
# nexo-rs daemon's discovery walker can register the plugin
# without spawning the subprocess. Operators add the directory
# containing this file to `plugins.discovery.search_paths`.
#
# Unlike telegram / whatsapp, email is a SINGLE plugin instance
# that manages N internal accounts via `EmailPluginConfig.accounts`.
# There is no per-instance `registry_name` divergence —
# `manifest().plugin.id` and `Plugin::name()` agree at all times.

[plugin]
id = "email"
version = "0.6.0"
name = "Email"
description = "Email (IMAP/SMTP) channel for nexo agents — multi-account internal."
min_nexo_version = ">=0.1.0"

[plugin.requires]
nexo_capabilities = ["broker"]

# Phase 81.33.b.real Stages 1+2+4+5 — auto-discovery broker
# handler subscribe allowlist. Defense-in-depth so the plugin
# can only handle the topics it owns.
[plugin.capabilities.broker]
subscribe = [
    "plugin.outbound.email",
    "plugin.outbound.email.>",
    # Phase 81.20.x F1 — Stage 1 pairing adapter handlers.
    # Email is form-paired (no QR); `send_qr_image` stubs
    # `not_supported` so daemon's `GenericBrokerPairingAdapter`
    # degrades gracefully.
    "plugin.email.pairing.normalize_sender",
    "plugin.email.pairing.send_reply",
    "plugin.email.pairing.send_qr_image",
    "plugin.email.http.request",
    "plugin.email.admin.>",
    "plugin.email.metrics.scrape",
]
publish   = ["plugin.inbound.email", "plugin.inbound.email.>"]

# Phase 81.20.x F1 — Stage 1 pairing adapter. Form-based (no
# QR): operator pastes IMAP/SMTP credentials in the admin UI;
# daemon's `GenericBrokerPairingAdapter` forwards
# `PairingChannelAdapter` trait calls to:
#   plugin.email.pairing.normalize_sender
#   plugin.email.pairing.send_reply
#   plugin.email.pairing.send_qr_image  (stub error)
[plugin.pairing]
kind           = "form"
label          = "Email"
instance_field = "instance"

[plugin.pairing.adapter]
channel_id          = "email"
broker_topic_prefix = "plugin.email"

[plugin.pairing.instructions]
es = "Pega las credenciales IMAP/SMTP de la cuenta de correo. Si es Gmail, podemos sugerir OAuth."
en = "Paste the IMAP/SMTP credentials for the email account. If it's Gmail, we can suggest OAuth."

[[plugin.pairing.fields]]
name        = "instance"
label       = "Instance name"
placeholder = "support"
required    = true

[[plugin.pairing.fields]]
name        = "address"
label       = "Email address"
placeholder = "team@example.com"
required    = true

[[plugin.pairing.fields]]
name        = "auth_kind"
label       = "Auth method"
placeholder = "password | google_oauth"
help        = "Type 'password' for IMAP/SMTP basic auth, or 'google_oauth' to reuse Gmail OAuth credentials configured in google-auth.yaml."
required    = true

[[plugin.pairing.fields]]
name        = "imap_host"
label       = "IMAP host"
placeholder = "imap.example.com"
required    = false   # derived from `address` via provider_hint when blank

[[plugin.pairing.fields]]
name        = "smtp_host"
label       = "SMTP host"
placeholder = "smtp.example.com"
required    = false   # derived from `address` via provider_hint when blank

[[plugin.pairing.fields]]
name        = "password"
label       = "Password / app password"
sensitive   = true
required    = false   # required if auth_kind == "password"

# Phase 81.20.x F1 — Stage 8 binary entrypoint. Daemon's
# binary-mode discovery walker (`PluginDiscoveryConfig`)
# invokes `<command> --print-manifest` to bootstrap. Operator
# installs via `cargo install nexo-plugin-email`; binary lands
# in `$HOME/.cargo/bin/nexo-plugin-email` and the walker
# auto-discovers without manifest config edit.
[plugin.entrypoint]
command = "nexo-plugin-email"

# Phase 81.33.b.real Stage 2 — daemon mounts HTTP proxy under
# `/email`. Forwards requests via broker JSON-RPC. The plugin
# owns its internal router (see `src/auto_discovery.rs::http_request`).
[plugin.http]
mount_prefix    = "/email"
timeout_seconds = 30

# Phase 81.33.b.real Stage 4 — admin RPC commands forwarded via
# broker. Daemon receives `nexo/admin/email/<verb>` + forwards
# to `plugin.email.admin.<verb>`.
[plugin.admin]
method_prefix       = "nexo/admin/email/"
broker_topic_prefix = "plugin.email.admin"
timeout_seconds     = 15

# Phase 81.33.b.real Stage 5 — Prometheus metrics scrape via
# broker. Replaces the legacy in-process direct call from the
# daemon's `run_metrics_server` to
# `nexo_plugin_email::metrics::render_prometheus`.
[plugin.metrics]
prometheus          = true
broker_topic_prefix = "plugin.email"
timeout_seconds     = 5

# Phase 81.33.b.real Stage 6 — setup wizard dashboard surface.
# 0.5.0: email is multi-tenant; the wizard walks per-tenant subdirs
# of the workspace and probes per-account password files inside.
# Legacy 0.4.x single-map YAML still works via the back-compat
# shim — those operators see one synthetic `default` tenant.
[plugin.dashboard.layout]
kind = "workspace_walk"
subdir = "email"

[plugin.dashboard.auth_check]
kind = "session_dir_files"
candidates = ["email_password.txt", ".nexo-paired"]

# Phase 93.4.c — declarative config contract. Daemon delivers
# operator YAML at `cfg.plugins.entries.email` (Phase 93.3) via
# `plugin.configure` JSON-RPC (Phase 93.2); SDK `on_configure`
# handler deserialises into `EmailPluginConfig` (single-instance
# shape, no Vec wrapper).
[plugin.config_schema]
shape = "array"
schema = '''{
  "type": "object",
  "properties": {
    "enabled":                   { "type": "boolean" },
    "max_body_bytes":            { "type": "integer" },
    "max_attachment_bytes":      { "type": "integer" },
    "attachment_retention_days": { "type": "integer" },
    "max_dlq_lines":             { "type": "integer" },
    "bounce_retention_days":     { "type": "integer" },
    "attachments_dir":           { "type": "string" },
    "outbound_queue_dir":        { "type": "string" },
    "poll_fallback_seconds":     { "type": "integer" },
    "idle_reissue_minutes":      { "type": "integer" },
    "spf_dkim_warn":             { "type": "boolean" },
    "instance":                  { "type": "string" },
    "allow_agents":              { "type": "array" },
    "loop_prevention": {
      "type": "object",
      "properties": {
        "auto_submitted": { "type": "boolean" },
        "list_headers":   { "type": "boolean" },
        "self_from":      { "type": "boolean" },
        "spam_flag":      { "type": "boolean" },
        "feedback_id":    { "type": "boolean" },
        "esp_mailer":     { "type": "boolean" }
      }
    },
    "accounts": { "type": "array" }
  }
}'''

# Phase 93.8.c — credential store contribution (Phase 93.8.a-daemon
# manifest section). Daemon's `SubprocessNexoPlugin::credential_store()`
# reads this and constructs a `RemoteCredentialStore` round-tripping
# the four `plugin.credentials.*` JSON-RPCs to the handlers
# registered in `src/main.rs`. Accounts are the inner
# `EmailPluginConfig.accounts` entries keyed by `instance`.
[plugin.credentials_schema]
enabled = true
accounts_shape = "array"
